name: Android CI / APK Builder

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Permission for Gradle Wrapper
      # Agar hamare paas gradle wrapper local nahi bhi hai, toh hum ise fallback setups ke liye safe rakhte hain
      run: |
        if [ -f gradlew ]; then chmod +x gradlew; fi

    - name: Build Debug APK
      # Kyunki hum wrapper push nahi kar rahe, system automatic default gradle use karke assemble kar dega
      run: gradle assembleDebug

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PhoneMaster-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk

